<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LooFinder</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <link rel="stylesheet" href="style.css">

    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>

    <div id="loader"><div class="spinner"></div> Fetching facilities...</div>
    <button id="btn-search-area" onclick="triggerSearchArea()"><span class="material-symbols-outlined" style="vertical-align: middle; font-size: 18px;">refresh</span> Search this area</button>

    <div id="reviewModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title" id="modalFacilityName">Review Facility</div>
            <div class="stars">
                <span class="star" data-value="5" onclick="setRating(5)">★</span>
                <span class="star" data-value="4" onclick="setRating(4)">★</span>
                <span class="star" data-value="3" onclick="setRating(3)">★</span>
                <span class="star" data-value="2" onclick="setRating(2)">★</span>
                <span class="star" data-value="1" onclick="setRating(1)">★</span>
            </div>
            <textarea id="reviewText" placeholder="Was it clean? Leave a tip for others..."></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" style="flex: 2;" onclick="submitReview()">Submit</button>
            </div>
        </div>
    </div>

    <div id="reviewsListModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title" id="listModalFacilityName">Reviews</div>
            <div id="reviewsContainer" class="reviews-list-container"></div>
            <div class="modal-actions">
                <button class="btn-cancel" style="width: 100%;" onclick="closeReviewsList()">Close</button>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-top">
            <h1 style="display: flex; align-items: center; gap: 8px;">
                <span class="material-symbols-outlined">wc</span> LooFinder
            </h1>
            <p>Find clean, accessible public toilets near you.</p>
            <div class="filters">
                <div class="filter-chip" id="chip-accessible" onclick="toggleFilter('accessible')">
                    <span class="material-symbols-outlined" style="font-size: 16px; vertical-align: middle;">accessible</span> Accessible
                </div>
                <div class="filter-chip" id="chip-baby" onclick="toggleFilter('baby')">
                    <span class="material-symbols-outlined" style="font-size: 16px; vertical-align: middle;">baby_changing_station</span> Baby
                </div>
            </div>
            <button class="btn-primary" onclick="findNearest()">
                <span class="material-symbols-outlined" style="vertical-align: middle; font-size: 18px;">my_location</span> Find Nearest to Me
            </button>
        </div>
        <div class="list-header">Nearest 5 Facilities</div>
        <div id="facility-list" class="facility-list"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
